user:
  login_details: "SELECT u.USER_ID, u.FIRST_NAME, u.LAST_NAME, u.EMAIL, u.ROLE, u.PHONE, u.STATUS, u.TWO_FA_ENABLED, a.ACCOUNT_NO, a.BALANCE, a.STATUS as ACC_STATUS FROM USERS u JOIN ACCOUNTS a ON u.USER_ID = a.USER_ID WHERE u.EMAIL = ?"
  get_password_by_acc: "SELECT u.PASSWORD_HASH FROM USERS u JOIN ACCOUNTS a ON u.USER_ID = a.USER_ID WHERE a.ACCOUNT_NO = ?"
  get_password_by_email: "SELECT PASSWORD_HASH FROM USERS WHERE EMAIL = ?"
  get_details: "SELECT u.FIRST_NAME, u.LAST_NAME, u.EMAIL, a.BALANCE FROM USERS u JOIN ACCOUNTS a ON u.USER_ID = a.USER_ID WHERE a.ACCOUNT_NO = ?"
  signup: "INSERT INTO USERS (FIRST_NAME, LAST_NAME, AADHAAR_NO, EMAIL, PASSWORD_HASH, PHONE, DATE_OF_BIRTH, ADDRESS, PAN_NO, ROLE) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)"
  update_password: "UPDATE USERS SET PASSWORD_HASH = ? WHERE USER_ID = ?"
  update_password_by_account: "UPDATE USERS u JOIN ACCOUNTS a ON u.USER_ID = a.USER_ID SET u.PASSWORD_HASH = ? WHERE a.ACCOUNT_NO = ?"
  recover_details: "SELECT u.FIRST_NAME, u.LAST_NAME, a.ACCOUNT_NO FROM USERS u JOIN ACCOUNTS a ON u.USER_ID = a.USER_ID WHERE u.EMAIL = ?"
  check_email_exists: "SELECT COUNT(*) FROM USERS WHERE EMAIL = ?"
  check_aadhaar_exists: "SELECT COUNT(*) FROM USERS WHERE AADHAAR_NO = ?"
  get_user_by_email: "SELECT * FROM USERS WHERE EMAIL = ?"
  update_failed_logins: "UPDATE USERS SET FAILED_LOGIN_ATTEMPTS = ?, LOCKED_UNTIL = ?, STATUS = ? WHERE EMAIL = ?"

account:
  create: "INSERT INTO ACCOUNTS (ACCOUNT_NO, USER_ID, BALANCE) VALUES (?, ?, 0.00)"
  withdraw: "UPDATE ACCOUNTS SET BALANCE = BALANCE - ?, VERSION = VERSION + 1 WHERE ACCOUNT_NO = ? AND BALANCE >= ? AND VERSION = ?"
  deposit: "UPDATE ACCOUNTS SET BALANCE = BALANCE + ?, VERSION = VERSION + 1 WHERE ACCOUNT_NO = ? AND VERSION = ?"
  get_balance: "SELECT BALANCE FROM ACCOUNTS WHERE ACCOUNT_NO = ?"
  get_account: "SELECT * FROM ACCOUNTS WHERE ACCOUNT_NO = ?"
  get_version: "SELECT VERSION FROM ACCOUNTS WHERE ACCOUNT_NO = ?"
  check_pw: "SELECT u.PASSWORD_HASH, u.USER_ID FROM USERS u JOIN ACCOUNTS a ON u.USER_ID = a.USER_ID WHERE a.ACCOUNT_NO = ?"

loan:
  apply: "INSERT INTO LOAN_APPLICATIONS (ACCOUNT_NO, LOAN_TYPE, AMOUNT, TENURE, PURPOSE) VALUES (?, ?, ?, ?, ?)"
  get_by_account: "SELECT * FROM LOAN_APPLICATIONS WHERE ACCOUNT_NO = ? ORDER BY APPLIED_AT DESC"
  update_status: "UPDATE LOAN_APPLICATIONS SET STATUS = ?, REVIEWED_BY = ?, REVIEW_NOTES = ?, REVIEWED_AT = ? WHERE ID = ?"

transaction:
  log: "INSERT INTO TRANSACTIONS (SENDER_ACCOUNT, RECEIVER_ACCOUNT, AMOUNT, TX_TYPE, REMARK, REFERENCE_NO) VALUES (?, ?, ?, ?, ?, ?)"
  statement: "SELECT * FROM TRANSACTIONS WHERE SENDER_ACCOUNT = ? OR RECEIVER_ACCOUNT = ? ORDER BY CREATED_AT DESC LIMIT ? OFFSET ?"
  count_statement: "SELECT COUNT(*) FROM TRANSACTIONS WHERE SENDER_ACCOUNT = ? OR RECEIVER_ACCOUNT = ?"
  get_daily_withdrawal_total: "SELECT COALESCE(SUM(AMOUNT), 0) FROM TRANSACTIONS WHERE SENDER_ACCOUNT = ? AND TX_TYPE = 'WITHDRAWAL' AND DATE(CREATED_AT) = CURDATE()"

notification:
  create: "INSERT INTO NOTIFICATIONS (ACCOUNT_NO, MESSAGE, TYPE, ICON, ACTION_LINK) VALUES (?, ?, ?, ?, ?)"
  get_unread_count: "SELECT COUNT(*) FROM NOTIFICATIONS WHERE ACCOUNT_NO = ? AND IS_READ = FALSE"
  get_latest: "SELECT * FROM NOTIFICATIONS WHERE ACCOUNT_NO = ? ORDER BY CREATED_AT DESC LIMIT ?"
  mark_read: "UPDATE NOTIFICATIONS SET IS_READ = TRUE WHERE ID = ? AND ACCOUNT_NO = ?"
  mark_all_read: "UPDATE NOTIFICATIONS SET IS_READ = TRUE WHERE ACCOUNT_NO = ?"

otp:
  save: "INSERT INTO OTP_STORE (EMAIL, OTP_HASH, ACCOUNT_NO, PURPOSE, EXPIRES_AT) VALUES (?, ?, ?, ?, ?)"
  get_latest: "SELECT * FROM OTP_STORE WHERE EMAIL = ? AND PURPOSE = ? ORDER BY CREATED_AT DESC LIMIT 1"
  mark_verified: "UPDATE OTP_STORE SET VERIFIED = TRUE WHERE ID = ?"
  increment_attempts: "UPDATE OTP_STORE SET ATTEMPTS = ATTEMPTS + 1 WHERE ID = ?"
  delete_by_email: "DELETE FROM OTP_STORE WHERE EMAIL = ? AND PURPOSE = ?"

beneficiary:
  add: "INSERT INTO BENEFICIARIES (OWNER_ACCOUNT, BENEFICIARY_ACCOUNT, BENEFICIARY_NAME, BANK_NAME, IFSC_CODE, NICKNAME) VALUES (?, ?, ?, ?, ?, ?)"
  get_by_owner: "SELECT * FROM BENEFICIARIES WHERE OWNER_ACCOUNT = ? AND IS_ACTIVE = TRUE"
  delete: "UPDATE BENEFICIARIES SET IS_ACTIVE = FALSE WHERE ID = ? AND OWNER_ACCOUNT = ?"
  check_exists: "SELECT COUNT(*) FROM BENEFICIARIES WHERE OWNER_ACCOUNT = ? AND BENEFICIARY_ACCOUNT = ?"

card:
  request: "INSERT INTO CARD_REQUESTS (ACCOUNT_NO, CARD_TYPE, REQUEST_TYPE, REASON) VALUES (?, ?, ?, ?)"
  get_by_account: "SELECT * FROM CARD_REQUESTS WHERE ACCOUNT_NO = ? ORDER BY CREATED_AT DESC"
  update_status: "UPDATE CARD_REQUESTS SET STATUS = ?, CARD_NUMBER_MASKED = ?, IS_BLOCKED = ?, REVIEWED_BY = ? WHERE ID = ?"

deposit_fd_rd:
  create_fd: "INSERT INTO FIXED_DEPOSITS (ACCOUNT_NO, AMOUNT, INTEREST_RATE, TENURE_MONTHS, MATURITY_DATE, MATURITY_AMOUNT) VALUES (?, ?, ?, ?, ?, ?)"
  get_fd_by_account: "SELECT * FROM FIXED_DEPOSITS WHERE ACCOUNT_NO = ? ORDER BY CREATED_AT DESC"
  create_rd: "INSERT INTO RECURRING_DEPOSITS (ACCOUNT_NO, MONTHLY_AMOUNT, INTEREST_RATE, TENURE_MONTHS, MATURITY_AMOUNT, NEXT_DEBIT_DATE) VALUES (?, ?, ?, ?, ?, ?)"
  get_rd_by_account: "SELECT * FROM RECURRING_DEPOSITS WHERE ACCOUNT_NO = ? ORDER BY CREATED_AT DESC"

bill_payment:
  pay: "INSERT INTO BILL_PAYMENTS (ACCOUNT_NO, BILLER_NAME, BILLER_CATEGORY, AMOUNT, REFERENCE_NO, CONSUMER_NO, STATUS) VALUES (?, ?, ?, ?, ?, ?, ?)"
  get_by_account: "SELECT * FROM BILL_PAYMENTS WHERE ACCOUNT_NO = ? ORDER BY CREATED_AT DESC"

complaint:
  raise: "INSERT INTO COMPLAINTS (ACCOUNT_NO, TICKET_NO, SUBJECT, DESCRIPTION, CATEGORY, PRIORITY) VALUES (?, ?, ?, ?, ?, ?)"
  get_by_account: "SELECT * FROM COMPLAINTS WHERE ACCOUNT_NO = ? ORDER BY CREATED_AT DESC"
  update_status: "UPDATE COMPLAINTS SET STATUS = ?, RESOLUTION = ?, ASSIGNED_TO = ? WHERE ID = ?"

audit:
  log: "INSERT INTO AUDIT_LOG (ACCOUNT_NO, USER_ID, ACTION, DETAILS, IP_ADDRESS, USER_AGENT) VALUES (?, ?, ?, ?, ?, ?)"
  get_by_account: "SELECT * FROM AUDIT_LOG WHERE ACCOUNT_NO = ? ORDER BY CREATED_AT DESC LIMIT ?"

kyc:
  upload: "INSERT INTO KYC_DOCUMENTS (ACCOUNT_NO, DOCUMENT_TYPE, FILE_NAME, FILE_PATH, FILE_SIZE, MIME_TYPE) VALUES (?, ?, ?, ?, ?, ?)"
  get_by_account: "SELECT * FROM KYC_DOCUMENTS WHERE ACCOUNT_NO = ?"
  update_status: "UPDATE KYC_DOCUMENTS SET STATUS = ?, REJECTION_REASON = ?, VERIFIED_BY = ?, VERIFIED_AT = ? WHERE ID = ?"

admin:
  list_customers: "SELECT u.USER_ID, u.FIRST_NAME, u.LAST_NAME, u.EMAIL, u.PHONE, u.STATUS, u.CREATED_AT, a.ACCOUNT_NO, a.BALANCE, a.STATUS AS ACC_STATUS FROM USERS u JOIN ACCOUNTS a ON u.USER_ID = a.USER_ID WHERE u.ROLE = 'CUSTOMER' ORDER BY u.CREATED_AT DESC"
  recent_transactions: "SELECT t.ID, t.SENDER_ACCOUNT, t.RECEIVER_ACCOUNT, t.AMOUNT, t.TX_TYPE, t.STATUS, t.REFERENCE_NO, t.CREATED_AT FROM TRANSACTIONS t ORDER BY t.CREATED_AT DESC LIMIT ?"
  list_loans: "SELECT l.ID, l.ACCOUNT_NO, l.LOAN_TYPE, l.AMOUNT, l.TENURE, l.PURPOSE, l.STATUS, l.APPLIED_AT, u.FIRST_NAME, u.LAST_NAME, u.EMAIL FROM LOAN_APPLICATIONS l JOIN ACCOUNTS a ON l.ACCOUNT_NO = a.ACCOUNT_NO JOIN USERS u ON a.USER_ID = u.USER_ID ORDER BY l.APPLIED_AT DESC"
  update_loan_status: "UPDATE LOAN_APPLICATIONS SET STATUS = ?, REVIEWED_BY = (SELECT USER_ID FROM ACCOUNTS WHERE ACCOUNT_NO = ?), REVIEWED_AT = NOW() WHERE ID = ?"